<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meshcoms Portal</title>
  <meta name="description" content="Unified Meshtastic and MeshCore communication portal — Serial & WiFi.">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "@liamcottle/meshcore.js": "https://ga.jspm.io/npm:@liamcottle/meshcore.js@1.12.0/src/index.js",
      "@meshtastic/core": "https://ga.jspm.io/npm:@meshtastic/core@2.6.7/dist/mod.js",
      "@meshtastic/transport-web-serial": "https://ga.jspm.io/npm:@meshtastic/transport-web-serial@0.2.5/dist/mod.js",
      "https://ga.jspm.io/npm:@jspm/core@2.1.0/nodelibs/browser/util.js": "./util_v2_shim.js",
      "util": "./util_v2_shim.js",
      "process": "https://ga.jspm.io/npm:@jspm/core@2.1.0/nodelibs/browser/process.js",
      "buffer": "https://ga.jspm.io/npm:@jspm/core@2.1.0/nodelibs/browser/buffer.js"
    },
    "scopes": {
      "https://ga.jspm.io/": {
        "util": "./util_v2_shim.js",
        "crc/calculators/crc16ccitt": "https://ga.jspm.io/npm:crc@4.3.2/mjs/calculators/crc16ccitt.js",
        "os": "https://ga.jspm.io/npm:@jspm/core@2.1.0/nodelibs/browser/os.js",
        "path": "https://ga.jspm.io/npm:@jspm/core@2.1.0/nodelibs/browser/path.js"
      }
    }
  }
  </script>
  <script>
    window.addEventListener('error', function(e) {
      if (!document.getElementById('global-error')) {
        const div = document.createElement('div');
        div.id = 'global-error';
        div.style = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;';
        document.body.appendChild(div);
      }
      document.getElementById('global-error').innerHTML += '<div>' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      if (!document.getElementById('global-error')) {
        const div = document.createElement('div');
        div.id = 'global-error';
        div.style = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;';
        document.body.appendChild(div);
      }
      document.getElementById('global-error').innerHTML += '<div>Unhandled Promise: ' + e.reason + '</div>';
    });
  </script>
  <script type="module" src="polyfills.js"></script>
  <script type="module" src="app_v2.js?v=12"></script>
</head>
<body>
  <div class="app-container">

    <!-- Left Sidebar -->
    <aside class="sidebar glass-panel">

      <div class="panel-header">
        <h1>Meshcoms Portal</h1>
        <p class="subtitle">Unified Serial &amp; WiFi bridge</p>
      </div>

      <!--
        Module cards are injected here dynamically by app_v2.js.
        To add a new protocol: extend ProtocolModule and call registerModule() in app_v2.js.
      -->
      <div class="connection-cards" id="module-cards"></div>

    </aside>

    <!-- Main Chat Window -->
    <main class="main-chat glass-panel">

      <div class="panel-header chat-panel-header">
        <h2>Lora Public Channels</h2>
        <span id="active-module-indicator" class="active-indicator"></span>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty-state">
          Connect to a node to start receiving messages.
        </div>
      </div>

      <div class="chat-input-area">
        <!-- Send-target radios are injected here by app_v2.js -->
        <div class="target-selectors" id="send-target-group"></div>

        <form id="chat-form" style="display: contents;">
          <div class="input-wrapper">
            <input
              type="text"
              id="chat-input"
              class="chat-input"
              placeholder="Type a message…"
              autocomplete="off"
              disabled>
            <button type="submit" id="btn-send" class="btn-send" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </form>
      </div>

    </main>
  </div>

  <div id="toast-container"></div>
</body>
</html>
